# A flower creature dancing in a field of differently-colored flowers.
# Character is red/yellow (no green) so the greenscreen chroma-key doesn't
# eat its stem; background is blue/purple for contrast.

song:
  source: "https://vt.tiktok.com/ZSxowC4kY/"

theme: "a vast dreamy field of blue and purple wildflowers, soft golden sunlight, gentle breeze, cinematic, ultra-detailed, no people"

character:
  description: "a giant friendly flower creature, bright red and yellow petals, two enormous googly eyes and a soft closed-lip smile in the flower center, short brown stem legs"
