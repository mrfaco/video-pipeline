# OOTD / playful-posing format (NOT dancing): she walks toward the camera in a
# casual-chic outfit-of-the-day reveal against a sunny beige wall. Self-contained
# — the `motion:` field swaps dancing for a runway walk, captions off for the
# clean look. Just run it (swap song.source for other OOTD sounds).
mode: dance
captions: false

song:
  source: "https://www.tiktok.com/@efratelmalich/video/7633006091575627024"

style: "an outfit-of-the-day look — a short sleek dark bob with a middle part, small rectangular tortoiseshell sunglasses, a fitted white ribbed tank top, a tan corduroy mini skirt, layered gold jewelry (hoop earrings, cuff bracelet, rings, a necklace), a brown leather tote bag on the shoulder, white socks and green retro sneakers, casual and chic"

motion: "the woman walks confidently straight TOWARD the camera, approaching and getting closer with each step, a smooth runway-style catwalk strut, swaying her hips, playfully looking into the lens with pouty and smiling expressions, flipping her hair and a hand on her hip as she walks, an outfit-of-the-day reveal, casual and effortless, low-angle handheld phone shot, smooth natural movement, NOT dancing"

theme: "a sunny outdoor spot against a beige stucco and stone-block wall beside a doorway, bright Mediterranean daylight, casual streetwear photoshoot vibe"
