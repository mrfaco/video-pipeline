# Mimic mode: the locked neon girl performs the EXACT moves of a driving dance
# video (MimicMotion motion transfer). Drop the trending dance URL into
# drive.source. Output is MUTE and has NO text — add the sound + captions at
# post. Her identity is held from presets/characters/neon_girl.png via PuLID.
mode: mimic

drive:
  source: "REPLACE_WITH_DANCE_VIDEO_URL"

character:
  image: presets/characters/neon_girl.png
  lora: presets/characters/neon_girl.lora.safetensors
  trigger: neongirl

style: "Y2K cyber-rave aesthetic — sleek hair, metallic holographic makeup, a fitted metallic holographic outfit, shiny and futuristic"

theme: "a neon cyberpunk club, glowing lasers and holographic lights, dark with vivid colours, plain uncluttered backdrop"
