# OOTD format, twirl variant: she starts close to the camera, walks back, then
# twirls to reveal the outfit. Same casual-chic "type" as ootd_beige, new motion.
mode: dance
captions: false

song:
  source: "https://vt.tiktok.com/ZSQLPD5q7/"

style: "an outfit-of-the-day look — a short sleek dark bob with a middle part, small rectangular tortoiseshell sunglasses, a fitted white ribbed tank top, a tan corduroy mini skirt, layered gold jewelry (hoop earrings, cuff bracelet, rings, a necklace), a brown leather tote bag on the shoulder, white socks and green retro sneakers, casual and chic"

